<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SearchShift</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e40;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --text-muted: #888899;
      --green: #34d399;
      --red: #f87171;
      --radius: 10px;
    }

    body {
      width: 320px;
      min-height: 200px;
      max-height: 560px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      overflow-y: auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #1a1a28 0%, #12121c 100%);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-settings {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .btn-settings:hover {
      background: var(--surface);
      color: var(--accent2);
      border-color: var(--accent);
    }

    /* Trigger hint */
    .trigger-hint {
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .trigger-hint .kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 11px;
      color: var(--accent2);
    }

    /* Engine list */
    .engines-section {
      padding: 8px 0;
    }

    .section-label {
      padding: 6px 16px 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .engine-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-radius: 0;
      transition: background 0.12s ease;
    }

    .engine-item:hover {
      background: var(--surface);
    }

    .engine-icon {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .engine-icon img {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .engine-info {
      flex: 1;
      min-width: 0;
    }

    .engine-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .engine-keyword {
      font-size: 10px;
      color: var(--accent2);
      font-family: monospace;
      background: rgba(108, 99, 255, 0.12);
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid rgba(108, 99, 255, 0.25);
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .toggle-slider::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .toggle input:checked + .toggle-slider {
      background: rgba(108, 99, 255, 0.3);
      border-color: var(--accent);
    }

    .toggle input:checked + .toggle-slider::after {
      background: var(--accent2);
      left: calc(100% - 16px);
    }

    /* Empty state */
    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: var(--text-muted);
    }

    /* Footer */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text {
      font-size: 10px;
      color: var(--text-muted);
    }

    .footer-count {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Loading */
    .loading {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-bottom: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">⇄</div>
      <span class="logo-text">SearchShift</span>
    </div>
    <a href="../options/index.html" target="_blank" class="btn-settings" id="btn-open-settings">
      ⚙ Settings
    </a>
  </div>

  <!-- Trigger hint -->
  <div class="trigger-hint" id="trigger-hint">
    Trigger: <span class="kbd" id="trigger-kbd">s</span> + Tab · Use
    <span class="kbd">@keyword</span> to pick engine
  </div>

  <!-- Engine list -->
  <div class="engines-section">
    <div class="section-label">Your Engines</div>
    <div id="engine-list">
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading…</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text" id="footer-text">SearchShift v1.0</span>
    <span class="footer-count" id="footer-count"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
